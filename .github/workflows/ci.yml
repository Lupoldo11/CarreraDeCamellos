name: ci

on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches: 
      - main
      - develop
  workflow_dispatch:

permissions: 
  contents: read

jobs:

  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Compilar proyecto
        run: mvn clean compile
        
  unit-tests:
    name: Unit Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Generar reporte JaCoCo
        run: mvn jacoco:report
        
  #test_integracion:
  
  sonar:
    name: SonarQube
    needs: [ build , unit-tests ]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Coverage
        run: mvn verify
      - name: Sonar Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar
          -Dsonar.projectKey=TU_PROJECT_KEY
          -Dsonar.organization=TU_ORGANIZATION
          -Dsonar.host.url=https://sonarcloud.io
          
  #image:
